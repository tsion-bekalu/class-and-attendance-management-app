name: attendance_app
description: Class Attendance Management System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  
  sqflite: ^2.3.0          # SQLite database plugin for Flutter
  path: ^1.8.3             # For handling database file paths
  path_provider: ^2.1.0    # To find the correct directory on device

  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  
  go_router: ^13.0.0
  
  
  intl: ^0.18.1            # Date/time formatting
  uuid: ^4.2.1             # Generate unique IDs
  

  qr_flutter: ^4.0.0       # Generate QR codes
  mobile_scanner: ^3.5.0   # Scan QR codes

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
   

 